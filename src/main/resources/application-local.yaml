spring:
  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: false
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
    timeout: 30m
    redis:
      flush-mode: on_save
      namespace: coongyapay:session
      repository-type: indexed
